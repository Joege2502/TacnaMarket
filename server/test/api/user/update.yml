info:
  name: Update User
  type: http
  seq: 4

http:
  method: PATCH
  url: http://localhost:3001/user/{{userId}}
  headers:
    - name: Authorization
      value: Bearer {{token}}
      type: text
  body:
    type: json
    data: |-
      {
        "name": "Updated Name",
        "address": "Dirección Actualizada 789"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
