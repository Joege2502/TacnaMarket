info:
  name: Create User
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:3001/user
  headers:
    - name: Authorization
      value: Bearer {{token}}
      type: text
  body:
    type: json
    data: |-
      {
        "name": "New User",
        "username": "newuser@example.com",
        "password": "SecurePassword456",
        "address": "Avenida Secundaria 456"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
